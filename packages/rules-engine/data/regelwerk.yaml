# Regelwerk CRA-Copilot — Selbstauskunfts-Tiefe (Wizard, Stufe 1)
#
# ADR-003/ADR-010: Regulatorische Referenzen sind Daten. Jede inhaltliche Aussage
# trägt review_status (pending = fachlich ungeprüft, Freigabe durch Director).
# Das rules-v0.1-Tag setzt 0 pending voraus (TEST_STRATEGY §3).
#
# Konventionen (von pruefeStruktur erzwungen):
# - Frage `rolle` existiert, Werte sind gültige Rollen.
# - Jede Option von `produkttyp` ist von mindestens einer Kategorie-Regel abgedeckt.
# - Sichtbarkeitsbedingungen verweisen nur auf frühere Fragen (linearer Fluss).
#
# Terminal-Regeln werden in Reihenfolge geprüft und beenden den Fluss vorzeitig,
# sobald ihre Bedingungen beantwortet und erfüllt sind.

rules_version: '0.2.0-draft'
stand: '2026-06-12'

fragen:
  - id: rolle
    typ: einfachauswahl
    text:
      de: 'Welche Rolle hat Ihr Unternehmen für dieses Produkt?'
    erlaeuterung:
      de: >-
        Der Cyber Resilience Act unterscheidet, wer ein Produkt herstellt, einführt
        oder nur weiterverkauft — davon hängen die Pflichten ab. Wählen Sie die
        Rolle, die am ehesten zutrifft. Bei mehreren Rollen: die mit der größten
        Verantwortung (Hersteller vor Importeur vor Händler).
    optionen:
      - wert: hersteller
        text: { de: 'Hersteller' }
        erlaeuterung:
          de: >-
            Sie entwickeln das Produkt selbst oder lassen es entwickeln und bieten
            es unter eigenem Namen oder eigener Marke an.
      - wert: importeur
        text: { de: 'Importeur' }
        erlaeuterung:
          de: >-
            Sie bringen das Produkt eines Herstellers aus einem Land außerhalb der
            EU erstmals auf den EU-Markt.
      - wert: haendler
        text: { de: 'Händler' }
        erlaeuterung:
          de: >-
            Sie verkaufen Produkte anderer Anbieter weiter, ohne sie zu verändern
            oder unter eigenem Namen anzubieten.
      - wert: os_steward
        text: { de: 'Open-Source-Steward' }
        erlaeuterung:
          de: >-
            Sie sind eine Organisation (z. B. Stiftung), die Open-Source-Software
            dauerhaft unterstützt, ohne sie kommerziell zu vertreiben.

  - id: produktart
    typ: einfachauswahl
    text:
      de: 'Was bieten Sie an?'
    erlaeuterung:
      de: >-
        Der CRA gilt für „Produkte mit digitalen Elementen": Software oder
        vernetzbare Hardware, die als Produkt auf den Markt kommt — im Laden, im
        App-Store oder als Download.
    optionen:
      - wert: hardware_mit_software
        text: { de: 'Ein Gerät mit Software' }
        erlaeuterung:
          de: 'Zum Beispiel ein IoT-Gerät, eine Maschine mit Steuerung, ein Netzwerkgerät.'
      - wert: software_produkt
        text: { de: 'Ein Software-Produkt' }
        erlaeuterung:
          de: >-
            Eine App, ein Programm oder eine Bibliothek, die Kunden installieren
            oder in eigene Produkte einbauen.
      - wert: reine_dienstleistung
        text: { de: 'Eine reine Online-Dienstleistung (SaaS)' }
        erlaeuterung:
          de: >-
            Ihre Kunden nutzen die Lösung nur über das Internet, ohne dass Sie
            ihnen ein Produkt liefern.
      - wert: kein_digitales_produkt
        text: { de: 'Weder Software noch vernetzbare Hardware' }

  - id: dienstleistung_fuer_produkt
    typ: einfachauswahl
    text:
      de: >-
        Ist Ihre Online-Lösung notwendig, damit ein Produkt funktioniert, das Sie
        selbst auf den Markt bringen?
    erlaeuterung:
      de: >-
        Häufig übersehen: Eine Cloud, ohne die Ihr Gerät oder Ihre App nicht
        funktioniert („entfernte Datenverarbeitung"), zählt rechtlich zum Produkt —
        dann gilt der CRA auch für sie.
    optionen:
      - wert: ja
        text: { de: 'Ja — sie gehört zu einem Produkt von uns' }
      - wert: nein
        text: { de: 'Nein — sie ist eine eigenständige Dienstleistung' }
    sichtbar_wenn:
      - frage: produktart
        ist_eine_von: [reine_dienstleistung]

  - id: datenverbindung
    typ: einfachauswahl
    text:
      de: >-
        Kann das Produkt Daten mit anderen Geräten oder Netzwerken austauschen —
        direkt oder indirekt?
    erlaeuterung:
      de: >-
        Auch indirekte Verbindungen zählen, etwa Synchronisation über USB oder
        eine Companion-App. Nur Produkte ganz ohne Datenverbindung fallen aus dem
        CRA heraus.
    optionen:
      - wert: ja
        text: { de: 'Ja' }
      - wert: nein
        text: { de: 'Nein, vollständig offline' }
    sichtbar_wenn:
      - frage: produktart
        ist_eine_von: [hardware_mit_software, software_produkt, reine_dienstleistung]

  - id: eu_markt
    typ: einfachauswahl
    text:
      de: 'Bieten Sie das Produkt in der EU an — oder planen Sie das?'
    erlaeuterung:
      de: >-
        Der CRA knüpft an das Inverkehrbringen auf dem EU-Markt an. Auch ein
        geplanter Markteintritt zählt für Ihre Vorbereitung.
    optionen:
      - wert: ja
        text: { de: 'Ja, bereits am Markt oder geplant' }
      - wert: nein
        text: { de: 'Nein, kein EU-Vertrieb' }
    sichtbar_wenn:
      - frage: produktart
        ist_eine_von: [hardware_mit_software, software_produkt, reine_dienstleistung]

  - id: ausnahmebereich
    typ: einfachauswahl
    text:
      de: 'Fällt das Produkt in einen dieser Sonderfälle?'
    erlaeuterung:
      de: >-
        Für einige Branchen gelten eigene Cybersicherheits-Regime, und einzelne
        Produktarten nimmt der CRA ausdrücklich aus — dort ist die Verordnung
        ganz oder teilweise nicht anwendbar.
    optionen:
      - wert: medizinprodukt
        text: { de: 'Medizinprodukt / In-vitro-Diagnostikum' }
      - wert: kfz
        text: { de: 'Fahrzeuge mit Typgenehmigung (z. B. UNECE R155)' }
      - wert: luftfahrt
        text: { de: 'Zivile Luftfahrt' }
      - wert: schiffsausruestung
        text: { de: 'Schiffsausrüstung' }
        erlaeuterung:
          de: 'Ausrüstung im Anwendungsbereich der Schiffsausrüstungsrichtlinie (EU) 2014/90.'
      - wert: verteidigung
        text: { de: 'Ausschließlich für Verteidigung / nationale Sicherheit' }
      - wert: ersatzteil
        text: { de: 'Ersatzteil, das eine identische Komponente ersetzt' }
        erlaeuterung:
          de: >-
            Nur wenn das Teil nach denselben Spezifikationen gefertigt wird wie
            die Komponente, die es ersetzt.
      - wert: keiner
        text: { de: 'Keiner dieser Sonderfälle' }
    sichtbar_wenn:
      - frage: produktart
        ist_eine_von: [hardware_mit_software, software_produkt, reine_dienstleistung]

  - id: oss
    typ: einfachauswahl
    text:
      de: 'Wie ist die Open-Source-Situation Ihres Produkts?'
    erlaeuterung:
      de: >-
        Nicht-kommerzielle Open-Source-Software fällt nicht unter den CRA. Sobald
        Sie mit der Software Geld verdienen — etwa durch Support, Dual-Lizenzen
        oder eine gehostete Version — gelten die Pflichten aber.
    optionen:
      - wert: nicht_oss
        text: { de: 'Kein Open Source (proprietär)' }
      - wert: oss_kommerziell
        text: { de: 'Open Source mit kommerzieller Verwertung' }
        erlaeuterung:
          de: 'Zum Beispiel bezahlter Support, Dual-Lizenzierung oder eine bezahlte Cloud-Version.'
      - wert: oss_nicht_kommerziell
        text: { de: 'Reines Open-Source-Projekt ohne Kommerzialisierung' }
    sichtbar_wenn:
      - frage: rolle
        ist_eine_von: [hersteller]

  - id: produkttyp
    typ: einfachauswahl
    text:
      de: 'Entspricht das Produkt einer dieser Produktgruppen?'
    erlaeuterung:
      de: >-
        Der CRA stuft bestimmte Produktgruppen als „wichtig" oder „kritisch" ein —
        dafür gelten strengere Nachweispflichten. Trifft mehr als eine Gruppe zu
        (z. B. Router mit Firewall-Funktion), wählen Sie die strengste zutreffende
        Gruppe. Passt keine, wählen Sie „Keine davon".
    optionen:
      - wert: passwortmanager
        text: { de: 'Passwort-Manager' }
      - wert: identity_management
        text: { de: 'Identitätsverwaltung / privilegierte Zugriffsverwaltung' }
        erlaeuterung:
          de: 'Zum Beispiel Single-Sign-on, Verzeichnisdienste, PAM-Lösungen, Zugangskontrollsoftware.'
      - wert: browser
        text: { de: 'Browser (eigenständig oder eingebettet)' }
      - wert: antivirus
        text: { de: 'Virenschutz / Endpoint-Schutz' }
      - wert: vpn
        text: { de: 'VPN-Produkt' }
      - wert: netzwerkmanagement
        text: { de: 'Netzwerkmanagement-System' }
      - wert: siem
        text: { de: 'SIEM (Security Information & Event Management)' }
      - wert: boot_manager
        text: { de: 'Boot-Manager' }
      - wert: remote_access
        text: { de: 'Fernzugriffs-/Fernwartungssoftware' }
      - wert: mdm
        text: { de: 'Mobile-Device-Management (MDM)' }
      - wert: netzwerk_schnittstelle
        text: { de: 'Physische oder virtuelle Netzwerkschnittstelle' }
      - wert: chip_sicherheit
        text: { de: 'Mikroprozessor / Mikrocontroller / ASIC / FPGA mit Sicherheitsfunktionen' }
        erlaeuterung:
          de: 'Ohne Manipulationssicherheit — manipulationssichere Chips sind eine eigene Gruppe weiter unten.'
      - wert: firewall_unternehmen
        text: { de: 'Firewall / Intrusion Detection (nicht-industriell)' }
        erlaeuterung:
          de: 'Für Heim- oder Unternehmensnetze. Industrielle Umgebungen sind eine eigene Gruppe weiter unten.'
      - wert: router_consumer
        text: { de: 'Internet-Router oder Modem (Endkundenbereich)' }
      - wert: smarthome_sicherheit
        text: { de: 'Smart-Home-Produkt mit Sicherheitsfunktion' }
        erlaeuterung:
          de: 'Zum Beispiel smarte Türschlösser, Alarmanlagen, Überwachungskameras, Babyfone.'
      - wert: sprachassistent
        text: { de: 'Smart-Home-Sprachassistent' }
      - wert: spielzeug_vernetzt
        text: { de: 'Vernetztes Spielzeug mit Chat- oder Ortungsfunktion' }
      - wert: wearable_gesundheit
        text: { de: 'Wearable mit Gesundheitsüberwachung' }
      - wert: betriebssystem
        text: { de: 'Betriebssystem' }
      - wert: hypervisor_container
        text: { de: 'Hypervisor oder Container-Laufzeitumgebung' }
      - wert: firewall_industrie
        text: { de: 'Firewall / Intrusion Detection für industrielle Umgebungen' }
      - wert: pki
        text: { de: 'PKI / Ausstellung digitaler Zertifikate' }
      - wert: mcu_manipulationssicher
        text: { de: 'Manipulationssicherer Mikroprozessor / Mikrocontroller' }
      - wert: smart_meter_gateway
        text: { de: 'Smart-Meter-Gateway' }
      - wert: smartcard_secure_element
        text: { de: 'Smartcard / Secure Element' }
      - wert: hsm_security_box
        text: { de: 'Hardware-Sicherheitsmodul (Gerät mit Security Box)' }
      - wert: keine_davon
        text: { de: 'Keine davon' }
    sichtbar_wenn:
      - frage: produktart
        ist_eine_von: [hardware_mit_software, software_produkt, reine_dienstleistung]

regeln:
  # ---- Terminal: Geltungsbereich (Reihenfolge = Prüfreihenfolge) ----
  - id: s_kein_digitales_produkt
    art: terminal
    bedingungen:
      - frage: produktart
        ist_eine_von: [kein_digitales_produkt]
    verdikt: ausserhalb
    titel: { de: 'Kein Produkt mit digitalen Elementen' }
    begruendung:
      de: >-
        Der CRA gilt nur für Software und vernetzbare Hardware. Ohne digitale
        Elemente ist die Verordnung nicht anwendbar.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 2 Abs. 1, Art. 3 Nr. 1' }
    review_status: pending

  - id: s_dienstleistung_ohne_produktbezug
    art: terminal
    bedingungen:
      - frage: produktart
        ist_eine_von: [reine_dienstleistung]
      - frage: dienstleistung_fuer_produkt
        ist_eine_von: [nein]
    verdikt: ausserhalb
    titel: { de: 'Eigenständige Dienstleistung (SaaS) ohne Produktbezug' }
    begruendung:
      de: >-
        Reine Online-Dienstleistungen ohne Bezug zu einem in Verkehr gebrachten
        Produkt fallen nicht unter den CRA. Hinweis: Für Dienste kann stattdessen
        NIS2 einschlägig sein — das prüft dieser Check nicht.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 3 Nr. 2, Erwägungsgrund 12' }
    review_status: pending

  - id: s_keine_datenverbindung
    art: terminal
    bedingungen:
      - frage: datenverbindung
        ist_eine_von: [nein]
    verdikt: ausserhalb
    titel: { de: 'Keine direkte oder indirekte Datenverbindung' }
    begruendung:
      de: >-
        Produkte, die weder direkt noch indirekt mit Geräten oder Netzwerken
        verbunden werden können, sind vom CRA nicht erfasst.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 2 Abs. 1' }
    review_status: pending

  - id: s_kein_eu_markt
    art: terminal
    bedingungen:
      - frage: eu_markt
        ist_eine_von: [nein]
    verdikt: ausserhalb
    titel: { de: 'Kein Inverkehrbringen auf dem EU-Markt' }
    begruendung:
      de: >-
        Der CRA knüpft an die Bereitstellung auf dem Unionsmarkt an. Ohne
        EU-Vertrieb entstehen keine CRA-Pflichten — bei späterem Markteintritt
        gilt die Verordnung aber ab dem ersten Tag.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 2 Abs. 1, Art. 3 Nr. 21/22' }
    review_status: pending

  - id: s_ausnahme_medizin
    art: terminal
    bedingungen:
      - frage: ausnahmebereich
        ist_eine_von: [medizinprodukt]
    verdikt: ausgenommen
    titel: { de: 'Sektorale Ausnahme: Medizinprodukte' }
    begruendung:
      de: >-
        Für Medizinprodukte und In-vitro-Diagnostika gelten die Cybersicherheits-
        anforderungen der MDR/IVDR — der CRA ist hier nicht anwendbar.
    referenz:
      {
        dokument: 'CRA (EU) 2024/2847',
        stelle: 'Art. 2 Abs. 2 i. V. m. (EU) 2017/745, (EU) 2017/746',
      }
    review_status: pending

  - id: s_ausnahme_kfz
    art: terminal
    bedingungen:
      - frage: ausnahmebereich
        ist_eine_von: [kfz]
    verdikt: ausgenommen
    titel: { de: 'Sektorale Ausnahme: Fahrzeuge' }
    begruendung:
      de: >-
        Fahrzeuge mit Typgenehmigung unterliegen dem eigenen Cybersicherheits-
        Regime (UNECE R155 / (EU) 2019/2144) — der CRA ist hier nicht anwendbar.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 2 Abs. 4 i. V. m. (EU) 2019/2144' }
    review_status: pending

  - id: s_ausnahme_luftfahrt
    art: terminal
    bedingungen:
      - frage: ausnahmebereich
        ist_eine_von: [luftfahrt]
    verdikt: ausgenommen
    titel: { de: 'Sektorale Ausnahme: Zivile Luftfahrt' }
    begruendung:
      de: >-
        Produkte im Anwendungsbereich der EU-Luftfahrtsicherheitsverordnung
        unterliegen deren Anforderungen — der CRA ist hier nicht anwendbar.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 2 Abs. 3 i. V. m. (EU) 2018/1139' }
    review_status: pending

  - id: s_ausnahme_schiff
    art: terminal
    bedingungen:
      - frage: ausnahmebereich
        ist_eine_von: [schiffsausruestung]
    verdikt: ausgenommen
    titel: { de: 'Sektorale Ausnahme: Schiffsausrüstung' }
    begruendung:
      de: >-
        Ausrüstung im Anwendungsbereich der Schiffsausrüstungsrichtlinie
        unterliegt deren Anforderungen — der CRA ist hier nicht anwendbar.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 2 i. V. m. (EU) 2014/90' }
    review_status: pending

  - id: s_ausnahme_verteidigung
    art: terminal
    bedingungen:
      - frage: ausnahmebereich
        ist_eine_von: [verteidigung]
    verdikt: ausgenommen
    titel: { de: 'Ausnahme: Verteidigung und nationale Sicherheit' }
    begruendung:
      de: >-
        Produkte, die ausschließlich für Zwecke der Verteidigung oder der
        nationalen Sicherheit entwickelt werden, sind vom CRA ausgenommen.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 2 Abs. 5–8' }
    review_status: pending

  - id: s_ausnahme_ersatzteil
    art: terminal
    bedingungen:
      - frage: ausnahmebereich
        ist_eine_von: [ersatzteil]
    verdikt: ausserhalb
    titel: { de: 'Ersatzteil für identische Komponente' }
    begruendung:
      de: >-
        Ersatzteile, die identische Komponenten ersetzen und nach denselben
        Spezifikationen gefertigt werden, sind vom CRA nicht erfasst.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 2' }
    review_status: pending

  - id: s_oss_nicht_kommerziell
    art: terminal
    bedingungen:
      - frage: oss
        ist_eine_von: [oss_nicht_kommerziell]
    verdikt: ausserhalb
    titel: { de: 'Nicht-kommerzielle Open-Source-Software' }
    begruendung:
      de: >-
        Open-Source-Software, die außerhalb einer Geschäftstätigkeit entwickelt
        und bereitgestellt wird, fällt nicht unter den CRA. Achtung: Kommerzielle
        Verwertung (Support, Dual-Lizenz, gehostete Version) ändert das.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Erwägungsgründe 18/19' }
    review_status: pending

  - id: s_os_steward
    art: terminal
    bedingungen:
      - frage: rolle
        ist_eine_von: [os_steward]
      - frage: datenverbindung
        ist_eine_von: [ja]
      - frage: eu_markt
        ist_eine_von: [ja]
      - frage: ausnahmebereich
        ist_eine_von: [keiner]
    verdikt: sonderregime_os_steward
    titel: { de: 'Sonderregime Open-Source-Steward' }
    begruendung:
      de: >-
        Für Open-Source-Stewards gilt ein erleichtertes Pflichtenregime: keine
        CE-Kennzeichnung, aber eine Cybersicherheits-Policy, Kooperation mit
        Behörden und Mitwirkung bei Meldepflichten.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 24' }
    review_status: pending

  # ---- Kategorie-Regeln (Annex-III/IV-Heuristik, Selbstauskunfts-Tiefe) ----
  - id: k_annex3_identity_management
    art: kategorie
    bedingungen: [{ frage: produkttyp, ist_eine_von: [identity_management] }]
    kategorie: wichtig_klasse_1
    titel: { de: 'Wichtiges Produkt Klasse I: Identitäts-/Zugriffsverwaltung' }
    begruendung:
      de: >-
        Identitätsverwaltungssysteme und Software für privilegierte
        Zugriffsverwaltung sind in Anhang III Klasse I gelistet.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Anhang III Klasse I' }
    review_status: pending

  - id: k_annex3_browser
    art: kategorie
    bedingungen: [{ frage: produkttyp, ist_eine_von: [browser] }]
    kategorie: wichtig_klasse_1
    titel: { de: 'Wichtiges Produkt Klasse I: Browser' }
    begruendung:
      de: 'Eigenständige und eingebettete Browser sind in Anhang III Klasse I gelistet.'
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Anhang III Klasse I' }
    review_status: pending

  - id: k_annex3_netzwerkmanagement
    art: kategorie
    bedingungen: [{ frage: produkttyp, ist_eine_von: [netzwerkmanagement] }]
    kategorie: wichtig_klasse_1
    titel: { de: 'Wichtiges Produkt Klasse I: Netzwerkmanagement' }
    begruendung:
      de: 'Netzwerkmanagement-Systeme sind in Anhang III Klasse I gelistet.'
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Anhang III Klasse I' }
    review_status: pending

  - id: k_annex3_siem
    art: kategorie
    bedingungen: [{ frage: produkttyp, ist_eine_von: [siem] }]
    kategorie: wichtig_klasse_1
    titel: { de: 'Wichtiges Produkt Klasse I: SIEM' }
    begruendung:
      de: >-
        Systeme für Security Information & Event Management sind in Anhang III
        Klasse I gelistet.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Anhang III Klasse I' }
    review_status: pending

  - id: k_annex3_boot_manager
    art: kategorie
    bedingungen: [{ frage: produkttyp, ist_eine_von: [boot_manager] }]
    kategorie: wichtig_klasse_1
    titel: { de: 'Wichtiges Produkt Klasse I: Boot-Manager' }
    begruendung:
      de: 'Boot-Manager sind in Anhang III Klasse I gelistet.'
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Anhang III Klasse I' }
    review_status: pending

  - id: k_annex3_remote_access
    art: kategorie
    bedingungen: [{ frage: produkttyp, ist_eine_von: [remote_access] }]
    kategorie: wichtig_klasse_1
    titel: { de: 'Wichtiges Produkt Klasse I: Fernzugriffssoftware' }
    begruendung:
      de: 'Software für Fernzugriff und Fernwartung ist in Anhang III Klasse I gelistet.'
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Anhang III Klasse I' }
    review_status: pending

  - id: k_annex3_mdm
    art: kategorie
    bedingungen: [{ frage: produkttyp, ist_eine_von: [mdm] }]
    kategorie: wichtig_klasse_1
    titel: { de: 'Wichtiges Produkt Klasse I: Mobile-Device-Management' }
    begruendung:
      de: 'Mobile-Device-Management-Software ist in Anhang III Klasse I gelistet.'
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Anhang III Klasse I' }
    review_status: pending

