pflichten:
  # ---- Hersteller: Meldepflichten ab September 2026 ----
  - id: p_meldung_schwachstellen
    titel: { de: 'Meldepflicht: aktiv ausgenutzte Schwachstellen' }
    beschreibung:
      de: >-
        Aktiv ausgenutzte Schwachstellen müssen binnen 24 Stunden (Frühwarnung)
        und 72 Stunden (Folgemeldung) an die zuständige CSIRT-Stelle und die
        ENISA gemeldet werden.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 14' }
    frist: '2026-09'
    gilt_fuer: { rollen: [hersteller] }
    review_status: pending

  - id: p_meldung_vorfaelle
    titel: { de: 'Meldepflicht: schwerwiegende Sicherheitsvorfälle' }
    beschreibung:
      de: >-
        Schwerwiegende Vorfälle mit Auswirkung auf die Produktsicherheit müssen
        binnen 24/72 Stunden gemeldet und die Nutzer informiert werden.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 14' }
    frist: '2026-09'
    gilt_fuer: { rollen: [hersteller] }
    review_status: pending

  # ---- Hersteller: volle Anwendung ab Dezember 2027 ----
  - id: p_anforderungen_annex1
    titel: { de: 'Grundlegende Cybersicherheitsanforderungen umsetzen' }
    beschreibung:
      de: >-
        Das Produkt muss die Anforderungen aus Anhang I Teil I erfüllen — u. a.
        sichere Standardkonfiguration, Zugriffskontrolle, Verschlüsselung,
        Update-Mechanismus und Minimierung der Angriffsfläche.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 13, Anhang I Teil I' }
    frist: '2027-12'
    gilt_fuer: { rollen: [hersteller] }
    review_status: pending

  - id: p_schwachstellenmanagement
    titel: { de: 'Schwachstellenmanagement-Prozess betreiben' }
    beschreibung:
      de: >-
        Anhang I Teil II verlangt u. a. eine Software-Stückliste (SBOM), eine
        Policy zur koordinierten Offenlegung (CVD), das unverzügliche Schließen
        von Schwachstellen und kostenlose Sicherheitsupdates.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Anhang I Teil II' }
    frist: '2027-12'
    gilt_fuer: { rollen: [hersteller] }
    review_status: pending

  - id: p_techdoku
    titel: { de: 'Technische Dokumentation erstellen' }
    beschreibung:
      de: >-
        Vor dem Inverkehrbringen ist eine technische Dokumentation nach Anhang VII
        zu erstellen und aktuell zu halten (u. a. Risikobewertung, Beschreibung
        von Entwurf und Schwachstellenmanagement).
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 31, Anhang VII' }
    frist: '2027-12'
    gilt_fuer: { rollen: [hersteller] }
    review_status: pending

  - id: p_support_zeitraum
    titel: { de: 'Support-Zeitraum festlegen und veröffentlichen' }
    beschreibung:
      de: >-
        Für das Produkt ist ein Unterstützungszeitraum festzulegen (Orientierung:
        erwartete Nutzungsdauer, im Regelfall mindestens fünf Jahre) und
        transparent zu kommunizieren; währenddessen sind Sicherheitsupdates
        bereitzustellen.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 13 Abs. 8' }
    frist: '2027-12'
    gilt_fuer: { rollen: [hersteller] }
    review_status: pending

  - id: p_benutzerinfo
    titel: { de: 'Nutzerinformationen bereitstellen' }
    beschreibung:
      de: >-
        Den Nutzern sind die Informationen nach Anhang II mitzugeben — u. a.
        Kontaktstelle für Schwachstellenmeldungen, Support-Zeitraum und
        Anleitung für sicheren Einsatz und Updates.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Anhang II' }
    frist: '2027-12'
    gilt_fuer: { rollen: [hersteller] }
    review_status: pending

  - id: p_konformitaet_default
    titel: { de: 'Konformitätsbewertung: interne Kontrolle möglich' }
    beschreibung:
      de: >-
        Für Produkte der Standardkategorie kann die Konformität in der Regel im
        Verfahren der internen Kontrolle (Modul A) in Eigenverantwortung bewertet
        werden.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 32, Anhang VIII' }
    frist: '2027-12'
    gilt_fuer: { rollen: [hersteller], kategorien: [default] }
    review_status: pending

  - id: p_konformitaet_wichtig
    titel: { de: 'Konformitätsbewertung: Verfahren für wichtige Produkte' }
    beschreibung:
      de: >-
        Für wichtige Produkte (Anhang III) ist die interne Kontrolle nur bei
        vollständiger Anwendung einschlägiger harmonisierter Normen zulässig;
        andernfalls ist ein Verfahren mit notifizierter Stelle erforderlich
        (z. B. EU-Baumusterprüfung).
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 32 Abs. 2/3, Anhang VIII' }
    frist: '2027-12'
    gilt_fuer: { rollen: [hersteller], kategorien: [wichtig_klasse_1, wichtig_klasse_2] }
    review_status: pending

  - id: p_konformitaet_kritisch
    titel: { de: 'Konformitätsbewertung: kritische Produkte' }
    beschreibung:
      de: >-
        Für kritische Produkte (Anhang IV) kann eine europäische
        Cybersicherheitszertifizierung vorgeschrieben werden; bis dahin gelten
        die Verfahren für wichtige Produkte der Klasse II.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 8, Art. 32' }
    frist: '2027-12'
    gilt_fuer: { rollen: [hersteller], kategorien: [kritisch] }
    review_status: pending

  - id: p_ce_kennzeichnung
    titel: { de: 'CE-Kennzeichnung und EU-Konformitätserklärung' }
    beschreibung:
      de: >-
        Nach erfolgreicher Konformitätsbewertung sind die EU-Konformitätserklärung
        auszustellen und die CE-Kennzeichnung anzubringen.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 28, Art. 30, Anhang V' }
    frist: '2027-12'
    gilt_fuer: { rollen: [hersteller] }
    review_status: pending

  # ---- Importeure ----
  - id: p_imp_pruefung
    titel: { de: 'Prüfpflicht vor dem Import' }
    beschreibung:
      de: >-
        Importeure dürfen nur Produkte in Verkehr bringen, für die der Hersteller
        die Konformitätsbewertung durchlaufen hat und die technische
        Dokumentation, CE-Kennzeichnung und Nutzerinformationen vorliegen.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 19' }
    frist: '2027-12'
    gilt_fuer: { rollen: [importeur] }
    review_status: pending

  - id: p_imp_angaben
    titel: { de: 'Importeurangaben am Produkt' }
    beschreibung:
      de: >-
        Name, eingetragener Handelsname und Kontaktanschrift des Importeurs sind
        auf dem Produkt oder seiner Verpackung/Dokumentation anzugeben.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 19' }
    frist: '2027-12'
    gilt_fuer: { rollen: [importeur] }
    review_status: pending

  - id: p_imp_information
    titel: { de: 'Informationspflicht bei Schwachstellen und Nichtkonformität' }
    beschreibung:
      de: >-
        Bei Kenntnis einer Schwachstelle oder Nichtkonformität muss der Importeur
        den Hersteller informieren und bei erheblichem Risiko auch die
        Marktüberwachungsbehörden.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 19' }
    frist: '2027-12'
    gilt_fuer: { rollen: [importeur] }
    review_status: pending

  # ---- Händler ----
  - id: p_hdl_sorgfalt
    titel: { de: 'Sorgfaltspflichten des Händlers' }
    beschreibung:
      de: >-
        Vor der Bereitstellung ist zu prüfen, dass CE-Kennzeichnung,
        Herstellerinformationen und Importeurangaben vorliegen; Lager- und
        Transportbedingungen dürfen die Konformität nicht gefährden.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 20' }
    frist: '2027-12'
    gilt_fuer: { rollen: [haendler] }
    review_status: pending

  - id: p_hdl_information
    titel: { de: 'Informationspflicht des Händlers' }
    beschreibung:
      de: >-
        Bei Kenntnis einer Schwachstelle oder Nichtkonformität sind Hersteller
        bzw. Importeur zu informieren, bei erheblichem Risiko auch die
        Marktüberwachungsbehörden.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 20' }
    frist: '2027-12'
    gilt_fuer: { rollen: [haendler] }
    review_status: pending

  # ---- Open-Source-Stewards ----
  - id: p_stw_meldung
    titel: { de: 'Mitwirkung an Meldepflichten' }
    beschreibung:
      de: >-
        Stewards müssen an der Meldung aktiv ausgenutzter Schwachstellen
        mitwirken, soweit sie in die Entwicklung der betroffenen Produkte
        eingebunden sind.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 14, Art. 24' }
    frist: '2026-09'
    gilt_fuer: { rollen: [os_steward] }
    review_status: pending

  - id: p_stw_policy
    titel: { de: 'Cybersicherheits-Policy aufstellen' }
    beschreibung:
      de: >-
        Stewards müssen eine Cybersicherheits-Policy einrichten, die sichere
        Entwicklung und den Umgang mit Schwachstellen der betreuten Produkte
        fördert.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 24 Abs. 1' }
    frist: '2027-12'
    gilt_fuer: { rollen: [os_steward] }
    review_status: pending

  - id: p_stw_kooperation
    titel: { de: 'Zusammenarbeit mit Marktüberwachungsbehörden' }
    beschreibung:
      de: >-
        Stewards müssen mit den Marktüberwachungsbehörden zusammenarbeiten und
        auf Verlangen die Dokumentation ihrer Policy bereitstellen.
    referenz: { dokument: 'CRA (EU) 2024/2847', stelle: 'Art. 24 Abs. 2/3' }
    frist: '2027-12'
    gilt_fuer: { rollen: [os_steward] }
    review_status: pending
