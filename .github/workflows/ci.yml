name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test (Unit, Golden Cases, Properties, Datenvalidierung)
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Playwright-Browser installieren
        run: pnpm --filter @cra-copilot/wizard exec playwright install --with-deps chromium

      - name: E2E (Playwright)
        run: pnpm run e2e
